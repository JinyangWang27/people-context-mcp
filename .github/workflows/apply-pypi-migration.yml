''', encoding='utf-8')
          (compat / 'src/people_context_mcp_compat/__init__.py').write_text(
              '"""Compatibility marker for the former people-context-mcp distribution."""\n',
              encoding='utf-8',
          )

          Path('tests/test_packaging_metadata.py').write_text('''from __future__ import annotations

import tomllib
from pathlib import Path


ROOT = Path(__file__).parents[1]


def _toml(path: Path) -> dict:
    with path.open("rb") as stream:
        return tomllib.load(stream)


def test_primary_distribution_uses_new_name_and_stable_entrypoints() -> None:
    project = _toml(ROOT / "pyproject.toml")["project"]

    assert project["name"] == "people-context"
    assert project["scripts"] == {
        "people-context-mcp": "people_context.adapters.mcp.server:main",
        "people-context": "people_context.cli:main",
    }


def test_legacy_distribution_is_dependency_only_compatibility_package() -> None:
    project = _toml(ROOT / "compat/people-context-mcp/pyproject.toml")["project"]

    assert project["name"] == "people-context-mcp"
    assert project["dependencies"] == ["people-context>=0.1.0"]
    assert project["scripts"]["people-context-mcp"] == "people_context.adapters.mcp.server:main"
    assert project["scripts"]["people-context"] == "people_context.cli:main"


def test_release_workflow_targets_primary_and_legacy_projects() -> None:
    workflow = (ROOT / ".github/workflows/release.yml").read_text(encoding="utf-8")

    assert "https://pypi.org/p/people-context\n" in workflow
    assert "https://pypi.org/p/people-context-mcp\n" in workflow
    assert "skip-existing: true" in workflow
''', encoding='utf-8')

      - name: Refresh lockfile
        run: uv lock

      - name: Install all dependencies
        run: uv sync --locked --all-extras

      - name: Run Ruff
        run: uv run --locked ruff check .

      - name: Run complete test suite
        run: uv run --locked pytest -q

      - name: Smoke-test entry points and distributions
        run: |
          uv run --locked people-context-mcp --help
          uv run --locked people-context --help
          uv build
          (cd compat/people-context-mcp && uv build --out-dir "$GITHUB_WORKSPACE/dist-legacy")
          uvx --from twine==6.2.0 twine check dist/* dist-legacy/*

      - name: Check obsolete repository URLs
        run: |
          if grep -R "JinyangWang27/people-context-mcp" --exclude-dir=.git .; then
            echo "::error::Found obsolete repository URL"
            exit 1
          fi

      - name: Commit migration
        run: |
          git rm .github/workflows/apply-pypi-migration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: migrate PyPI distribution to people-context"
          git push origin HEAD:claude/project-adoption-paths-426qn6
