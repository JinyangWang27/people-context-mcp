name: Publish OpenClaw plugin

on:
  pull_request:
    paths:
      - "openclaw-plugin/**"
      - "docs/openclaw-plugin.md"
      - ".github/workflows/package-publish.yml"
  workflow_dispatch:

permissions: read-all

jobs:
  verify-dist:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./openclaw-plugin
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Rebuild dist
        run: npm run build

      - name: Fail if committed dist is stale
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::Committed openclaw-plugin/dist is out of sync with src. Run 'npm run build' and commit the result."
            git --no-pager diff --stat -- dist
            exit 1
          fi

      - name: Run plugin tests
        run: npm test

  dry-run:
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      id-token: write
    # Pinned to the v0.12.0 commit SHA (mutable tags can be re-pointed at malicious code).
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@a230d962db64019462c2c8ee400755eb92169908
    with:
      source: ./openclaw-plugin
      owner: jinyangwang27
      dry_run: true

  publish:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      actions: read
      contents: read
      id-token: write
    # Pinned to the v0.12.0 commit SHA (mutable tags can be re-pointed at malicious code).
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@a230d962db64019462c2c8ee400755eb92169908
    with:
      source: ./openclaw-plugin
      owner: jinyangwang27
      dry_run: false
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
