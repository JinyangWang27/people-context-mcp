name: Validate Claude Code plugin

on:
  pull_request:
    paths:
      - ".claude-plugin/**"
      - "docs/claude-code-plugin.md"
      - ".github/workflows/claude-plugin-validate.yml"
      - ".github/tooling/claude-code/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/adapters/test_mcp_server.py"
      - "tests/adapters/test_email_import.py"
  push:
    branches:
      - main
    paths:
      - ".claude-plugin/**"
      - "docs/claude-code-plugin.md"
      - ".github/workflows/claude-plugin-validate.yml"
      - ".github/tooling/claude-code/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/adapters/test_mcp_server.py"
      - "tests/adapters/test_email_import.py"

permissions: read-all

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install Claude Code tooling
        working-directory: .github/tooling/claude-code
        run: npm ci --no-audit --no-fund

      - name: Validate marketplace and plugin
        run: .github/tooling/claude-code/node_modules/.bin/claude plugin validate . --strict

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Verify local MCP entry point
        run: uv run --locked people-context-mcp --help

      - name: Verify security boundaries
        run: >-
          uv run --locked pytest -q
          tests/adapters/test_mcp_server.py
          tests/adapters/test_email_import.py
