name: M7 review-fix validation

on:
  pull_request:

permissions:
  contents: write

jobs:
  validate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/m7-review-fixes-validation
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --all-extras
      - name: Apply reviewed fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"expected one match in {path}, found {count}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "src/people_context/adapters/mcp/server.py",
              """    conn = open_db(path)
              repository = SqlitePeopleRepository(conn)
              context_reader = SqliteContextReader(conn)
              graph_reader = SqliteGraphReader(conn)
              record_store = SqliteRecordStore(conn)
          """,
              """    conn = open_db(path)
              clock = SystemClock()
              repository = SqlitePeopleRepository(conn)
              context_reader = SqliteContextReader(conn)
              graph_reader = SqliteGraphReader(conn, clock)
              record_store = SqliteRecordStore(conn)
          """,
          )
          replace_once(
              "src/people_context/adapters/mcp/server.py",
              """    import_staging = SqliteImportStagingStore(conn)
              clock = SystemClock()
          """,
              """    import_staging = SqliteImportStagingStore(conn)
          """,
          )
          replace_once(
              "src/people_context/adapters/mcp/server.py",
              "get_relationship_graph=GetRelationshipGraph(repository, graph_reader),",
              "get_relationship_graph=GetRelationshipGraph(repository, graph_reader, relationship_vocabulary),",
          )
          replace_once(
              "src/people_context/cli.py",
              """def _open_context(db: str | None) -> CliContext:
              conn = open_db(resolve_db_path(db))
              repo: SqlitePeopleRepository | IndexingPeopleRepository = SqlitePeopleRepository(conn)
          """,
              """def _open_context(db: str | None) -> CliContext:
              conn = open_db(resolve_db_path(db))
              clock = SystemClock()
              repo: SqlitePeopleRepository | IndexingPeopleRepository = SqlitePeopleRepository(conn)
          """,
          )
          replace_once("src/people_context/cli.py", "clock=SystemClock(),", "clock=clock,")
          replace_once(
              "src/people_context/cli.py",
              "vault_reader=SqliteVaultReader(conn),",
              "vault_reader=SqliteVaultReader(conn, clock),",
          )
          replace_once(
              "docs/cli.md",
              """Dry-run is the default and performs no writes. Apply uses the same canonical policy as `set_relationship` and
          captures every update/removal atomically in audit and changelog. If two legacy rows become duplicates, the older
          id is retained.
          """,
              """Dry-run is the default and performs no writes. Apply uses the same canonical policy as `set_relationship` and
          captures every update/removal atomically in audit and changelog. Only duplicates with overlapping validity
          periods are merged; an edge active today is preferred, otherwise the older row is retained.
          """,
          )
          replace_once(
              "docs/cli.md",
              """The destination must be nonexistent, empty, or already contain `.people-context-vault`. A non-empty unmarked
          directory is refused without changes. Marked directories are dedicated generated output and are wiped before
          regeneration. Use `--include-sensitive` only with explicit intent; exported Markdown is outside the server's
          disclosure controls. See [vault-export.md](vault-export.md).
          """,
              """The destination must be nonexistent, empty, or already contain `.people-context-vault`. A non-empty unmarked
          directory is refused without changes. Re-export replaces only the marker plus `People/` and `Organizations/`;
          `.obsidian/` and every other user-created path are preserved. Use `--include-sensitive` only with explicit intent;
          exported Markdown is outside the server's disclosure controls. See [vault-export.md](vault-export.md).
          """,
          )
          replace_once(
              "docs/relationship-graph.md",
              """If canonicalization makes two rows duplicates, the older relationship id is retained and the newer row is
          removed. Both the rewrite and removal are represented in audit and changelog capture.
          """,
              """Canonical duplicates are merged only when their validity periods overlap. A row active today is retained in
          preference to an inactive overlapping row; otherwise the older relationship id is retained. Disjoint history
          remains as separate edges. Every rewrite and removal is represented in audit and changelog capture.
          """,
          )
          graph_tests = Path("tests/adapters/test_relationship_graph.py")
          graph_text = graph_tests.read_text(encoding="utf-8")
          graph_text = graph_text.replace("SqliteGraphReader(conn)", "SqliteGraphReader(conn, SystemClock())")
          graph_text = graph_text.replace(
              "GetRelationshipGraph(people, reader).execute",
              "GetRelationshipGraph(people, reader, vocabulary).execute",
          )
          graph_text = graph_text.replace(
              "conn, people, _, setter = _setup()",
              "conn, people, vocabulary, setter = _setup()",
          )
          graph_text = graph_text.replace(
              "GetRelationshipGraph(people, SqliteGraphReader(conn, SystemClock())).execute",
              "GetRelationshipGraph(people, SqliteGraphReader(conn, SystemClock()), vocabulary).execute",
          )
          graph_text = graph_text.replace(
              'SqliteGraphReader(open_db(":memory:"))',
              'SqliteGraphReader(open_db(":memory:"), SystemClock())',
          )
          graph_tests.write_text(graph_text, encoding="utf-8")

          vault_tests = Path("tests/adapters/test_vault_export.py")
          vault_text = vault_tests.read_text(encoding="utf-8")
          vault_text = vault_text.replace(
              "SqliteVaultReader(conn)",
              "SqliteVaultReader(conn, SystemClock())",
          )
          vault_tests.write_text(vault_text, encoding="utf-8")
          PY
      - name: Format changed Python
        run: |
          uv run ruff format \
            src/people_context/app/normalize_relationships.py \
            src/people_context/app/set_relationship.py \
            src/people_context/app/relationship_graph.py \
            src/people_context/adapters/sqlite/graph_reader.py \
            src/people_context/adapters/sqlite/relationship_store.py \
            src/people_context/adapters/sqlite/context_reader.py \
            src/people_context/adapters/sqlite/vault_reader.py \
            src/people_context/adapters/filesystem/vault_writer.py \
            src/people_context/adapters/mcp/server.py \
            src/people_context/cli.py \
            tests/adapters/test_relationship_graph.py \
            tests/adapters/test_vault_export.py \
            tests/adapters/test_m7_review_regressions.py
          uv run ruff check --fix \
            src/people_context/app/normalize_relationships.py \
            src/people_context/app/set_relationship.py \
            src/people_context/app/relationship_graph.py \
            src/people_context/adapters/sqlite/graph_reader.py \
            src/people_context/adapters/sqlite/relationship_store.py \
            src/people_context/adapters/sqlite/context_reader.py \
            src/people_context/adapters/sqlite/vault_reader.py \
            src/people_context/adapters/filesystem/vault_writer.py \
            src/people_context/adapters/mcp/server.py \
            src/people_context/cli.py \
            tests/adapters/test_relationship_graph.py \
            tests/adapters/test_vault_export.py \
            tests/adapters/test_m7_review_regressions.py
      - run: uv run ruff check .
      - name: Capture pytest output
        shell: bash
        run: |
          set +e
          uv run pytest -q --tb=short > pytest.txt 2>&1
          echo $? > pytest.exit
          exit 0
      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m7-review-pytest
          path: |
            pytest.txt
            pytest.exit
      - name: Enforce pytest result
        run: |
          cat pytest.txt
          test "$(cat pytest.exit)" = "0"
      - name: Commit validated fixes
        shell: bash
        run: |
          rm .github/workflows/m7-review-fixes-validation.yml
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git add -A
          git commit -m "fix: address M7 review findings" -m "Co-authored-by: Jinyang Wang <jinyang.wang27@outlook.com>"
          git push origin HEAD:codex/m7-review-fixes-validation
