name: Validate MCPB bundle

on:
  pull_request:
    paths:
      - "mcpb/**"
      - "docs/desktop-and-editors.md"
      - "tests/test_mcpb_bundle.py"
      - ".github/workflows/mcpb-validate.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mcpb/**"
      - "docs/desktop-and-editors.md"
      - "tests/test_mcpb_bundle.py"
      - ".github/workflows/mcpb-validate.yml"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Validate bundle contract
        run: uv run --locked pytest -q tests/test_mcpb_bundle.py

      - name: Validate manifest, pack, and inspect the archive
        # Uses the pinned @anthropic-ai/mcpb CLI from mcpb/build.sh via the
        # runner's preinstalled Node.js. Never installs a floating latest.
        run: mcpb/build.sh "${GITHUB_WORKSPACE}/dist-mcpb"
