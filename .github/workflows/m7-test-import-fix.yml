name: M7 test import correction

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/m7-review-fixes-validation
          fetch-depth: 0
      - name: Patch regression test import
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/adapters/test_m7_review_regressions.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace("from tests.app.fakes import FakeClock\n", "")
          text = text.replace(
              "\n_NOW = datetime(2026, 1, 1, 12, 0, tzinfo=UTC)",
              """

class FakeClock:
    def __init__(self, now: datetime) -> None:
        self._now = now

    def now(self) -> datetime:
        return self._now


_NOW = datetime(2026, 1, 1, 12, 0, tzinfo=UTC)""",
          )
          path.write_text(text, encoding="utf-8")
          PY
          rm .github/workflows/m7-test-import-fix.yml
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git add -A
          git commit -m "test: make M7 regression clock self-contained" -m "Co-authored-by: Jinyang Wang <jinyang.wang27@outlook.com>"
          git push origin HEAD:codex/m7-review-fixes-validation
