name: Validate Codex plugin

on:
  pull_request:
    paths:
      - ".agents/plugins/**"
      - ".codex-plugin/**"
      - ".mcp.json"
      - "docs/codex-plugin.md"
      - ".github/workflows/codex-plugin-validate.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/test_codex_plugin.py"
      - "tests/adapters/mcp/test_server.py"
  push:
    branches:
      - main
    paths:
      - ".agents/plugins/**"
      - ".codex-plugin/**"
      - ".mcp.json"
      - "docs/codex-plugin.md"
      - ".github/workflows/codex-plugin-validate.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/test_codex_plugin.py"
      - "tests/adapters/mcp/test_server.py"

permissions: read-all

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Validate plugin contracts
        run: uv run --locked pytest -q tests/test_codex_plugin.py tests/adapters/mcp/test_server.py

      - name: Verify local MCP entry point
        run: uv run --locked people-context-mcp --help
