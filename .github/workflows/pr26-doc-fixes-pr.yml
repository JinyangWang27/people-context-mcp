name: Apply PR 26 merge-ready repair

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/m7-graph-and-vault-6vdtgf
          fetch-depth: 0

      - name: Apply fail-closed documentation corrections
        run: python .github/pr26-merge-ready-fix.py

      - name: Remove one-off repair helpers before validation
        run: |
          rm -f \
            .github/pr26-merge-ready-fix.py \
            .github/pr26-merge-ready-trigger \
            .github/workflows/pr26-doc-fixes-pr.yml

      - uses: astral-sh/setup-uv@v6

      - name: Validate final repository state
        run: |
          git diff --check
          ! grep -R "## M10 — Agent utilization##" docs/specs
          ! grep -R "ListUpcomingDates(ContextReader" docs/specs
          ! grep -R "migrations/005_doctor_indexes.sql" docs/specs
          uv run ruff check .
          uv run pytest -q

      - name: Commit and push final documentation repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: make M8-M15 plan merge-ready"
          git push origin HEAD:claude/m7-graph-and-vault-6vdtgf
