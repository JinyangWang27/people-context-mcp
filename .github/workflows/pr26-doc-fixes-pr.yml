name: Apply PR 26 review fixes on PR update

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/m7-graph-and-vault-6vdtgf
          fetch-depth: 0

      - name: Apply fail-closed corrections
        run: python .github/pr26-fix.py

      - uses: astral-sh/setup-uv@v6

      - name: Validate
        run: |
          uv run ruff check .
          uv run pytest -q

      - name: Commit fixes and remove one-off helpers
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/pr26-fix.py .github/pr26-third-review-trigger .github/workflows/pr26-third-review-fixes.yml .github/workflows/pr26-doc-fixes-pr.yml
          git add docs/specs/pr-plan.md docs/specs/m9-cold-start-and-onboarding.md docs/specs/m11-sync-bundle-and-bootstrap-restore.md docs/specs/m12-trust-stability-v1.md docs/specs/m13-daily-utility.md docs/specs/m14-ecosystem-interop.md
          git commit -m "docs: address second PR 26 review"
          git push origin HEAD:claude/m7-graph-and-vault-6vdtgf
