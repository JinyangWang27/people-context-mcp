name: Apply PR 26 review fixes on PR update

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/m7-graph-and-vault-6vdtgf
          fetch-depth: 0

      - name: Run the fail-closed repair script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/pr26-doc-fixes.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          terminator = "\n          PY\n"
          body = workflow.split(marker, 1)[1].split(terminator, 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in body.splitlines())
          exec(compile(script, 'pr26-doc-fixes.py', 'exec'))
          Path('.github/workflows/pr26-doc-fixes-pr.yml').unlink()
          PY

      - uses: astral-sh/setup-uv@v6

      - name: Validate
        run: |
          uv run ruff check .
          uv run pytest -q

      - name: Commit fixes and remove one-off helpers
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/specs/pr-plan.md docs/specs/m8-distribution-and-reach.md docs/specs/m14-ecosystem-interop.md docs/specs/m15-data-quality-and-credibility.md .github/workflows/pr26-doc-fixes.yml .github/workflows/pr26-doc-fixes-pr.yml
          git commit -m "Fix PR plan review findings"
          git push origin HEAD:claude/m7-graph-and-vault-6vdtgf
