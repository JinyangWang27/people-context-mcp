name: Publish to PyPI

on:
  release:
    types:
      - published

permissions: read-all

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Verify lockfile
        run: uv lock --check

      - name: Build primary distribution
        run: uv build

      - name: Verify distribution metadata
        run: uvx --from twine==6.2.0 twine check dist/*

      - name: Store primary distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish people-context
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/people-context
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download primary distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish primary distribution
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1

  bundle:
    name: Attach native-UV MCPB bundle to the release
    # Wait for the primary PyPI publication: the bundle pins
    # people-context==<release>, so the .mcpb must not be attached (and become
    # downloadable) until that version actually exists on PyPI. `publish` is gated
    # by the `pypi` environment approval, so `needs: build` alone would attach an
    # uninstallable bundle during the approval window, or permanently if the
    # publish fails.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build native-UV MCPB bundle
        # Validates the manifest, packs the archive, and lists its contents with
        # the pinned @anthropic-ai/mcpb CLI (see mcpb/build.sh).
        run: mcpb/build.sh "${GITHUB_WORKSPACE}/dist-mcpb"

      - name: Attach bundle to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${GITHUB_WORKSPACE}/dist-mcpb/people-context.mcpb" --clobber
