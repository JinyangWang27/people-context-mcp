name: Apply security hardening

on:
  push:
    branches:
      - agent/security-hardening
    paths:
      - scripts/apply_security_hardening.py
      - .github/workflows/apply-security-hardening.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/security-hardening
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22.22.3"
          cache: npm
          cache-dependency-path: openclaw-plugin/package-lock.json

      - name: Apply source and documentation patch
        run: python scripts/apply_security_hardening.py

      - name: Format and lint Python
        run: |
          uv run ruff format \
            src/people_context/adapters/mcp/security.py \
            src/people_context/adapters/mcp/tools/people.py \
            src/people_context/adapters/mcp/tools/portability.py \
            src/people_context/app/import_content.py \
            tests/adapters/test_mcp_server.py \
            tests/adapters/test_email_import.py
          uv run ruff check .

      - name: Run Python tests
        run: uv run pytest

      - name: Build and validate OpenClaw plugin
        working-directory: openclaw-plugin
        run: |
          npm ci
          npm test
          npm run plugin:build
          npm run plugin:validate

      - name: Commit validated patch
        run: |
          rm scripts/apply_security_hardening.py
          rm .github/workflows/apply-security-hardening.yml
          rmdir scripts 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden high-disclosure MCP surfaces"
          git push origin HEAD:agent/security-hardening
